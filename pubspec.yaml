name: biovitals
description: "Real-time body vitals monitoring app — connects to ESP32 via BLE."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # BLE — communicate with ESP32 over Bluetooth Low Energy
  flutter_blue_plus: ^1.35.5

  # Charts — real-time and historical vital graphs
  fl_chart: ^0.70.2

  # State management — simple, Flutter-recommended
  provider: ^6.1.2

  # Local database — persist readings and sessions
  sqflite: ^2.4.2
  path_provider: ^2.1.5
  path: ^1.9.0

  # Date/time formatting
  intl: ^0.20.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
